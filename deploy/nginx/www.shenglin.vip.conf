# www.shenglin.vip - nginx 反向代理配置
# 服务器对外只暴露 80 端口，Strapi 运行在 1337

server {
    listen 80;
    server_name www.shenglin.vip;
    index index.php index.html index.htm default.php default.htm default.html;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $server_name;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $http_connection;
    access_log /www/sites/www.shenglin.vip/log/access.log main;
    error_log /www/sites/www.shenglin.vip/log/error.log;
    location ^~ /.well-known/acme-challenge {
        allow all;
        root /usr/share/nginx/html;
    }
    # API 反代到 Strapi
    location /api/ {
        proxy_pass http://0.0.0.0:1337/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 100m;
    }
    # Strapi Admin 面板
    location /admin/ {
        proxy_pass http://0.0.0.0:1337/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
    # Strapi 上传文件
    location /uploads/ {
        proxy_pass http://0.0.0.0:1337/uploads/;
        proxy_set_header Host $host;
    }
    # 媒体文件静态服务（本地存储回退）
    # 对外 URL 形如 /static/covers/xxx.png，物理文件位于 /www/apps/strapi/public/covers/xxx.png
    # alias 末尾斜杠必须保留，与 location 末尾斜杠匹配
    location /static/ {
        alias /www/apps/strapi/public/;
        try_files $uri =404;
        # 媒体文件缓存策略
        expires 7d;
        add_header Cache-Control "public, immutable";
        # 防止执行可执行文件（安全加固）
        location ~* \.(php|html|htm|js)$ {
            deny all;
        }
    }
    root /www/sites/www.shenglin.vip/index;
    error_page 404 /404.html;
}
