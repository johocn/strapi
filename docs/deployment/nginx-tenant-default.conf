# C 端租户域名 - 通配配置
# 在 1Panel 中创建默认静态网站（或通配 * 域名）后，将此配置粘贴到网站 Nginx 配置中
# 所有非 h.joho.cn 的域名都会命中此 server

server {
    listen 80 default_server;
    # listen 443 ssl default_server;  # SSL 启用后取消注释
    # ssl_certificate /www/sites/default/ssl/fullchain.pem;
    # ssl_certificate_key /www/sites/default/ssl/privkey.pem;
    server_name _;

    # 静态文件根目录（shao C端 H5 构建产物）
    root /var/www/shao;
    index index.html;

    # SPA 前端路由
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反代到 Strapi（租户域名由 site-resolver 中间件通过 Host 头识别）
    location /api/ {
        proxy_pass http://127.0.0.1:1337/api/;
        proxy_set_header Host $host;           # 关键：传递真实租户域名给 site-resolver
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 100m;
    }

    # 文件上传/静态资源
    location /uploads/ {
        proxy_pass http://127.0.0.1:1337/uploads/;
        proxy_set_header Host $host;
    }

    # 租户域名禁止访问 Strapi Admin
    location /admin/ {
        return 444;
    }

    # 日志
    access_log /var/log/nginx/tenant-default.access.log;
    error_log /var/log/nginx/tenant-default.error.log;
}
