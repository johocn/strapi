# 后台管理 - h.joho.cn
# 在 1Panel 中创建静态网站 h.joho.cn 后，将此配置粘贴到网站 Nginx 配置中

server {
    listen 80;
    # listen 443 ssl;  # SSL 启用后取消注释
    # ssl_certificate /www/sites/h.joho.cn/ssl/fullchain.pem;
    # ssl_certificate_key /www/sites/h.joho.cn/ssl/privkey.pem;
    server_name h.joho.cn;

    # 静态文件根目录（web 后台 H5 构建产物）
    root /var/www/web;
    index index.html;

    # SPA 前端路由（uniapp H5 history 模式）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API 反代到 Strapi 后端
    location /api/ {
        proxy_pass http://127.0.0.1:1337/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 100m;
    }

    # Strapi Admin 管理面板
    location /admin/ {
        proxy_pass http://127.0.0.1:1337/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket 支持（Strapi admin 实时更新）
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 文件上传/静态资源
    location /uploads/ {
        proxy_pass http://127.0.0.1:1337/uploads/;
        proxy_set_header Host $host;
    }

    # 日志
    access_log /var/log/nginx/h.joho.cn.access.log;
    error_log /var/log/nginx/h.joho.cn.error.log;
}
